<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoTube — Crédits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<aside class="sidebar">
  <div class="logo"><span class="logo-icon">▶</span><span class="logo-text">AutoTube</span></div>
  <nav class="nav">
    <a href="agent.html" class="nav-item"><span class="nav-icon">⬢</span> Agent IA</a>
    <a href="../index.html" class="nav-item"><span class="nav-icon">⬡</span> Dashboard</a>
    <a href="pipeline.html" class="nav-item"><span class="nav-icon">⟳</span> Pipeline</a>
    <a href="videos.html" class="nav-item"><span class="nav-icon">▦</span> Vidéos</a>
    <a href="credits.html" class="nav-item active"><span class="nav-icon">◈</span> Crédits</a>
    <a href="settings.html" class="nav-item"><span class="nav-icon">⚙</span> Config</a>
  </nav>
  <div class="sidebar-status"><div class="status-dot active"></div><span>Pipeline actif</span></div>
</aside>
<main class="main">
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="page-title">Crédits</h1>
      <span class="page-sub">Consommation par service · mis à jour en temps réel</span>
    </div>
    <div class="topbar-right">
      <button class="btn-launch" onclick="refreshAll()">↻ Actualiser tout</button>
    </div>
  </header>

  <div class="credits-detail-grid" id="credits-detail-grid">
    <!-- Rempli par JS -->
  </div>

  <div class="panel" style="margin-top:20px">
    <div class="panel-header">
      <span class="panel-title">Historique de consommation (7 jours)</span>
    </div>
    <div style="padding:20px">
      <canvas id="usage-chart" height="80"></canvas>
    </div>
  </div>
</main>

<style>
.credits-detail-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.cred-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
.cred-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.cred-service { font-family: var(--font-head); font-weight: 700; font-size: 16px; color: var(--text); }
.cred-link { font-size: 11px; color: var(--accent); text-decoration: none; }
.cred-link:hover { text-decoration: underline; }
.cred-big { font-family: var(--font-head); font-size: 40px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.cred-big.ok { color: var(--accent); }
.cred-big.warn { color: var(--warn); }
.cred-big.danger { color: var(--danger); }
.cred-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
.cred-bar-big { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-bottom: 16px; }
.cred-fill-big { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
.cred-fill-big.ok { background: var(--accent); }
.cred-fill-big.warn { background: var(--warn); }
.cred-fill-big.danger { background: var(--danger); }
.cred-stats { display: flex; flex-direction: column; gap: 8px; }
.cred-stat-row { display: flex; justify-content: space-between; font-size: 12px; }
.cred-stat-label { color: var(--text2); }
.cred-stat-val { color: var(--text); font-family: var(--font-mono); }
.cred-reset { font-size: 10px; color: var(--text3); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
@media (max-width: 900px) { .credits-detail-grid { grid-template-columns: 1fr; } }
</style>

<script src="../js/config.js"></script>
<script>
const SERVICES = {
  claude: {
    name: 'Claude API', icon: '⬡',
    link: 'https://console.anthropic.com', linkLabel: 'Console →',
    unit: 'tokens', unitLabel: 'tokens utilisés',
    resetDay: 1, resetLabel: 'Reset : jamais (pay-as-you-go)',
    totalLabel: 'Total alloué',
  },
  elevenlabs: {
    name: 'ElevenLabs', icon: '◎',
    link: 'https://elevenlabs.io/subscription', linkLabel: 'Abonnement →',
    unit: 'chars', unitLabel: 'caractères utilisés',
    resetDay: 1, resetLabel: 'Reset : 1er du mois',
    totalLabel: 'Quota mensuel',
  },
  replicate: {
    name: 'Replicate', icon: '◈',
    link: 'https://replicate.com/account/billing', linkLabel: 'Billing →',
    unit: 'cents', unitLabel: 'centimes dépensés',
    resetDay: null, resetLabel: 'Pay-as-you-go',
    totalLabel: 'Crédit disponible',
  },
};

function renderCreditsDetail() {
  const credits = JSON.parse(localStorage.getItem('autotube_credits') || '{}') || {
    claude:     { used: 0, total: 500000 },
    elevenlabs: { used: 0, total: 10000 },
    replicate:  { used: 0, total: 5000 },
  };

  const html = Object.entries(SERVICES).map(([key, s]) => {
    const c = credits[key] || { used: 0, total: 1 };
    const pct = Math.max(0, 100 - (c.used / c.total * 100));
    const cls = pct < 10 ? 'danger' : pct < 30 ? 'warn' : 'ok';
    const remaining = key === 'replicate'
      ? `$${((c.total - c.used)/100).toFixed(2)}`
      : (c.total - c.used).toLocaleString();
    const used = key === 'replicate'
      ? `$${(c.used/100).toFixed(2)}`
      : c.used.toLocaleString();
    const total = key === 'replicate'
      ? `$${(c.total/100).toFixed(2)}`
      : c.total.toLocaleString();

    return `<div class="cred-card">
      <div class="cred-card-header">
        <div class="cred-service">${s.icon} ${s.name}</div>
        <a href="${s.link}" target="_blank" class="cred-link">${s.linkLabel}</a>
      </div>
      <div class="cred-big ${cls}">${Math.round(pct)}%</div>
      <div class="cred-sub">restant · ${remaining} ${key==='replicate'?'':''+s.unit}</div>
      <div class="cred-bar-big">
        <div class="cred-fill-big ${cls}" style="width:${pct}%"></div>
      </div>
      <div class="cred-stats">
        <div class="cred-stat-row"><span class="cred-stat-label">Utilisé</span><span class="cred-stat-val">${used}</span></div>
        <div class="cred-stat-row"><span class="cred-stat-label">${s.totalLabel}</span><span class="cred-stat-val">${total}</span></div>
        <div class="cred-stat-row"><span class="cred-stat-label">Par vidéo (moy.)</span><span class="cred-stat-val">${perVideoEstimate(key)}</span></div>
      </div>
      <div class="cred-reset">${s.resetLabel}</div>
    </div>`;
  }).join('');

  document.getElementById('credits-detail-grid').innerHTML = html;
}

function perVideoEstimate(key) {
  const e = { claude: '~1 500 tokens', elevenlabs: '~800 chars', replicate: '~$0.016' };
  return e[key] || '—';
}

async function refreshAll() {
  showToast('Actualisation…', 'info');
  // ElevenLabs real check
  const key = localStorage.getItem('elevenlabs_api_key');
  if (key) {
    try {
      const r = await fetch('https://api.elevenlabs.io/v1/user', { headers: { 'xi-api-key': key } });
      if (r.ok) {
        const d = await r.json();
        const credits = JSON.parse(localStorage.getItem('autotube_credits') || '{}');
        credits.elevenlabs = credits.elevenlabs || {};
        credits.elevenlabs.used = d.subscription.character_count;
        credits.elevenlabs.total = d.subscription.character_limit;
        localStorage.setItem('autotube_credits', JSON.stringify(credits));
      }
    } catch(e) {}
  }
  renderCreditsDetail();
  showToast('Crédits actualisés ✓', 'success');
}

renderCreditsDetail();

let toastContainer = null;
function showToast(msg, type = 'info') {
  if (!toastContainer) { toastContainer = document.createElement('div'); toastContainer.className = 'toast-container'; document.body.appendChild(toastContainer); }
  const icons = { success:'✓', warn:'⚠', error:'✕', info:'ℹ' };
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type]}</span> ${msg}`;
  toastContainer.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
</script>
</body>
</html>
