<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoTube — Vidéos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<aside class="sidebar">
  <div class="logo"><span class="logo-icon">▶</span><span class="logo-text">AutoTube</span></div>
  <nav class="nav">
    <a href="agent.html" class="nav-item"><span class="nav-icon">⬢</span> Agent IA</a>
    <a href="../index.html" class="nav-item"><span class="nav-icon">⬡</span> Dashboard</a>
    <a href="pipeline.html" class="nav-item"><span class="nav-icon">⟳</span> Pipeline</a>
    <a href="videos.html" class="nav-item active"><span class="nav-icon">▦</span> Vidéos</a>
    <a href="credits.html" class="nav-item"><span class="nav-icon">◈</span> Crédits</a>
    <a href="settings.html" class="nav-item"><span class="nav-icon">⚙</span> Config</a>
  </nav>
  <div class="sidebar-status"><div class="status-dot active"></div><span>Pipeline actif</span></div>
</aside>
<main class="main">
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="page-title">Vidéos</h1>
      <span class="page-sub">Historique complet du pipeline</span>
    </div>
    <div class="topbar-right">
      <button class="btn-secondary" onclick="clearAll()">Vider l'historique</button>
    </div>
  </header>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Toutes les vidéos</span>
      <span id="vid-count" class="panel-action">0 vidéos</span>
    </div>
    <div id="full-videos-list"></div>
  </div>
</main>

<style>
.video-full-item { display:grid; grid-template-columns:80px 1fr auto auto; align-items:center; gap:16px; padding:16px 20px; border-bottom:1px solid var(--border); transition:background 0.15s; }
.video-full-item:last-child { border-bottom:none; }
.video-full-item:hover { background:var(--bg3); }
.vf-thumb { width:80px; height:45px; border-radius:4px; background:var(--bg3); border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; color:var(--text3); font-size:18px; overflow:hidden; }
.vf-thumb img { width:100%; height:100%; object-fit:cover; }
.vf-title { font-size:14px; color:var(--text); margin-bottom:4px; font-family:var(--font-head); }
.vf-meta { font-size:11px; color:var(--text2); display:flex; gap:12px; flex-wrap:wrap; }
.vf-cost { font-family:var(--font-mono); font-size:13px; color:var(--text2); }
.vf-actions { display:flex; gap:8px; }
.btn-icon { background:var(--bg3); border:1px solid var(--border2); color:var(--text2); border-radius:6px; padding:6px 10px; font-size:12px; cursor:pointer; transition:all 0.15s; }
.btn-icon:hover { border-color:var(--accent); color:var(--accent); }
.empty-state { padding:60px 20px; text-align:center; color:var(--text3); font-size:13px; }
.empty-state .big { font-size:32px; margin-bottom:12px; }
</style>

<script src="../js/config.js"></script>
<script>
function render() {
  const videos = JSON.parse(localStorage.getItem('autotube_videos') || '[]');
  const statusLabel = { published:'Publié', processing:'En cours', error:'Erreur', draft:'Brouillon' };
  document.getElementById('vid-count').textContent = `${videos.length} vidéo${videos.length>1?'s':''}`;

  if (videos.length === 0) {
    document.getElementById('full-videos-list').innerHTML = `<div class="empty-state"><div class="big">▶</div>Aucune vidéo encore. Lance ton premier pipeline depuis le Dashboard.</div>`;
    return;
  }

  document.getElementById('full-videos-list').innerHTML = videos.map(v => {
    const date = new Date(v.date).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });
    return `<div class="video-full-item">
      <div class="vf-thumb">${v.thumb ? `<img src="${v.thumb}">` : '▶'}</div>
      <div>
        <div class="vf-title">${v.title||'Sans titre'}</div>
        <div class="vf-meta">
          <span>${date}</span>
          <span>${v.views||0} vues</span>
          <span class="video-status ${v.status}">${statusLabel[v.status]||v.status}</span>
        </div>
      </div>
      <div class="vf-cost">$${(v.cost||0).toFixed(4)}</div>
      <div class="vf-actions">
        ${v.youtubeId ? `<button class="btn-icon" onclick="window.open('https://youtu.be/${v.youtubeId}','_blank')" title="Voir sur YouTube">▶</button>` : ''}
        ${v.youtubeId ? `<button class="btn-icon" onclick="window.open('https://studio.youtube.com/video/${v.youtubeId}/edit','_blank')" title="YouTube Studio">✎</button>` : ''}
        <button class="btn-icon" onclick="deleteVideo('${v.id}')" title="Supprimer">✕</button>
      </div>
    </div>`;
  }).join('');
}

function deleteVideo(id) {
  let vids = JSON.parse(localStorage.getItem('autotube_videos') || '[]');
  vids = vids.filter(v => v.id !== id);
  localStorage.setItem('autotube_videos', JSON.stringify(vids));
  render();
}

function clearAll() {
  if (confirm('Vider tout l\'historique local ?')) {
    localStorage.removeItem('autotube_videos');
    render();
  }
}

render();
</script>
</body>
</html>
